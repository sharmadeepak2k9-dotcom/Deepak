---
- name: testConnection
  hosts: "{{ host_filter }}"
  gather_facts: false

  tasks:
    - name: Ping target host
      ansible.builtin.ping:
      register: ping_result

    - name: Show success message
      ansible.builtin.debug:
        msg: "success"
      when: ping_result.ping == 'pong'

    - name: Check Java processes
      ansible.builtin.shell: "pgrep -fl java"
      register: ps_result
      changed_when: false
      failed_when: false

    - name: Show Java process output
      ansible.builtin.debug:
        var: ps_result.stdout_lines

    - name: Check jasperserver status
      ansible.builtin.shell: "systemctl status jasperserver"
      register: status_result
      become: yes
      changed_when: false
      failed_when: false

    - name: Show jasperserver status
      ansible.builtin.debug:
        var: status_result.stdout_lines

    - name: Stop jasperserver service
      ansible.builtin.shell: "systemctl stop jasperserver"
      become: yes
      register: stop_result
      failed_when: false

    - name: Show stop command result
      ansible.builtin.debug:
        var: stop_result.stdout_lines

    - name: Check jasperserver status after stop
      ansible.builtin.shell: "systemctl status jasperserver"
      register: status_after_stop
      become: yes
      changed_when: false
      failed_when: false

    - name: Show success if service inactive
      ansible.builtin.debug:
        msg: "successfully stopped"
      when: "'inactive' in status_after_stop.stdout"

    - name: Show jasperserver-pro  status after stop
      ansible.builtin.debug:
        var: status_after_stop.stdout_lines
      when: "'inactive' not in status_after_stop.stdout"

    - name: Switch to jasper user and verify
      ansible.builtin.shell: 'su - jasper -c "whoami"'
      become: yes
      register: su_result
      changed_when: false
      failed_when: false

    - name: Show su result
      ansible.builtin.debug:
        var: su_result.stdout

- name: Create jasper archive and back up tomcat
  hosts: "{{ host_filter }}"
  become: yes
  vars:
    jasper_base: /u01/app/jasper
    jasper_release_dir: jasperreports-server-9.0.0

  tasks:
    # zip is assumed present on the host; no installation step required

    # the following operations will run unconditionally


    - name: Ensure jasper base directory exists
      file:
        path: "{{ jasper_base }}"
        state: directory
        mode: '0755'

    - name: List contents of jasper base
      ansible.builtin.shell: ls -lrt
      args:
        chdir: "{{ jasper_base }}"
      become_user: jasper
      register: ls_before

    - name: Show listing before operations
      ansible.builtin.debug:
        var: ls_before.stdout_lines

    - name: Check jasper release directory exists
      ansible.builtin.stat:
        path: "{{ jasper_base }}/{{ jasper_release_dir }}"
      register: jasper_release_dir_stat
      become_user: jasper

    - name: Fail if jasper release directory is missing
      ansible.builtin.fail:
        msg: "Release directory {{ jasper_base }}/{{ jasper_release_dir }} does not exist"
      when: not jasper_release_dir_stat.stat.exists

    - name: Set backup date stamp
      ansible.builtin.shell: "date +%d%b%y | tr '[:upper:]' '[:lower:]'"
      register: backup_date
      changed_when: false
      become_user: jasper

    - name: Set backup name variables
      ansible.builtin.set_fact:
        backup_date_stamp: "{{ backup_date.stdout }}"
        archive_name: "jasperreports-server-9.0.0_{{ backup_date.stdout }}.zip"
        tomcat_backup_suffix: "_{{ backup_date.stdout }}"

    - name: Find current tomcat directory
      ansible.builtin.shell: "ls -d apache-tomcat* 2>/dev/null | head -1"
      args:
        chdir: "{{ jasper_base }}/{{ jasper_release_dir }}"
      register: found_tomcat_dir
      changed_when: false
      become_user: jasper
      failed_when: false

    - name: Set current tomcat directory name
      ansible.builtin.set_fact:
        current_tomcat_dir: "{{ found_tomcat_dir.stdout }}"
        tomcat_backup_dir: "{{ found_tomcat_dir.stdout }}{{ tomcat_backup_suffix }}"

    - name: Fail if no current tomcat directory exists
      ansible.builtin.fail:
        msg: "No apache-tomcat* directory found in {{ jasper_base }}/{{ jasper_release_dir }}"
      when: current_tomcat_dir == ''

    - name: Create zip archive of jasper release (idempotent)
      ansible.builtin.command: "zip -r {{ archive_name }} {{ jasper_release_dir }}/"
      args:
        chdir: "{{ jasper_base }}"
        creates: "{{ jasper_base }}/{{ archive_name }}"
      become_user: jasper

    - name: Notify success of archive creation
      ansible.builtin.debug:
        msg: "Successfully took backup"
      when: ansible_facts is defined  # always true, used to separate tasks

    - name: Find old jars
      find:
